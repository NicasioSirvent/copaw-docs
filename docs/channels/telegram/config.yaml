### 4. Public Bot Configuration

**File:** `~/.copaw/config.yaml`

```yaml
# ============================================
# CoPaw Telegram Channel - Public Bot
# Use case: Public AI service, open to all users
# ============================================

channels:
  telegram:
    enabled: true
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    mode: "polling"
    
    # Access Control - OPEN TO ALL
    allow_all_users: true
    dm_policy: "open"
    allow_from:
      - "*"  # Allow all users
    
    # Rate Limiting (recommended for public bots)
    rate_limit:
      enabled: true
      messages_per_minute: 10
      burst_limit: 20
    
    # Message Handling
    parse_mode: "Markdown"
    chunk_messages: true
    
    # Safety
    content_filter: true
    blocked_keywords:
      - "spam"
      - "abuse"
    
    # Logging
    log_messages: true
```

**⚠️ Security Warning:**
- Only use this configuration for public bots
- Monitor usage closely
- Implement rate limiting
- Consider adding CAPTCHA for new users

