### 5. Enterprise Configuration

**File:** `~/.copaw/config.yaml`

```yaml
# ============================================
# CoPaw Telegram Channel - Enterprise Setup
# Use case: Corporate internal bot
# ============================================

channels:
  telegram:
    enabled: true
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    mode: "webhook"
    webhook_port: 8787
    webhook_url: "https://copaw.internal.company.com:8787/telegram/callback"
    
    # SSL
    ssl_cert: "/etc/ssl/certs/company.pem"
    ssl_key: "/etc/ssl/private/company.pem"
    
    # Access Control - Strict
    allow_all_users: false
    allow_from:
      - "123456789"  # CEO
      - "234567890"  # CTO
      - "345678901"  # Team leads
    dm_policy: "allowlist"
    
    # Groups - Company only
    group_policy: "allowlist"
    group_allow_from:
      - "-1001111111111"  # Executive team
      - "-1002222222222"  # Engineering
      - "-1003333333333"  # Support
    
    # Security
    require_mention: true
    content_filter: true
    audit_log: true
    
    # Session
    session_memory: true
    session_ttl: 7200  # 2 hours
    
    # Compliance
    log_messages: true
    log_retention_days: 90
```

