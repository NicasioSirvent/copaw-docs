## Docker Configuration

### Docker Compose

**File:** `docker-compose.yml`

```yaml
version: '3.8'

services:
  copaw:
    image: agentscope/copaw:latest
    container_name: copaw
    ports:
      - "8088:8088"  # Web console
      - "8787:8787"  # Telegram webhook
    volumes:
      - ./config:/app/config
      - ./data:/app/working
      - ./ssl:/etc/ssl/certs:ro
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    restart: unless-stopped

  # Optional: Nginx reverse proxy for SSL
  nginx:
    image: nginx:alpine
    container_name: copaw-nginx
    ports:
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl/certs:ro
    depends_on:
      - copaw
    restart: unless-stopped
```

### Nginx Configuration

**File:** `nginx.conf`

```nginx
events {
    worker_connections 1024;
}

http {
    server {
        listen 443 ssl;
        server_name copaw.example.com;
        
        ssl_certificate /etc/ssl/certs/fullchain.pem;
        ssl_certificate_key /etc/ssl/certs/privkey.pem;
        
        location /telegram/callback {
            proxy_pass http://copaw:8787;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
```

