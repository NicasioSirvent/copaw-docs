### 3. Group Chat Bot Configuration

**File:** `~/.copaw/config.yaml`

```yaml
# ============================================
# CoPaw Telegram Channel - Group Chat Bot
# Use case: Team collaboration, community support
# ============================================

channels:
  telegram:
    enabled: true
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    mode: "polling"
    
    # Access Control
    allow_all_users: false
    
    # Group Settings
    group_policy: "allowlist"
    group_allow_from:
      - "-1001234567890"  # Main team group
      - "-1009876543210"  # Support group
    require_mention: true  # Must @mention bot
    
    # Auto-reply in groups (optional)
    group_auto_reply: false
    
    # Message Handling
    parse_mode: "Markdown"
    chunk_messages: true
    
    # Logging (enable for debugging)
    log_messages: true
```

**Get Group ID:**
```bash
# 1. Add bot to group
# 2. Send a message in the group
# 3. Check CoPaw logs:
copaw logs --follow | grep telegram

# Look for: "chat_id": "-1001234567890"
```

**Usage in Group:**
```
User: "@CoPawBot What's the weather today?"
Bot: [Responds with weather info]

User: "Let's have lunch!"  (no mention)
Bot: [Ignores - require_mention: true]
```

