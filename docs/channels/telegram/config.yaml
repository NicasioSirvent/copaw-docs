### 6. Multi-Agent Configuration

**File:** `~/.copaw/config.yaml`

```yaml
# ============================================
# CoPaw Telegram Channel - Multi-Agent Setup
# Use case: Different agents for different purposes
# ============================================

channels:
  telegram:
    enabled: true
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    mode: "polling"
    allow_all_users: true
    
    # Route to different agents based on command
    routing:
      rules:
        - pattern: "/research.*"
          agent: "research_agent"
        - pattern: "/code.*"
          agent: "coding_agent"
        - pattern: "/write.*"
          agent: "writing_agent"
        - pattern: ".*"
          agent: "main_agent"
    
    # Agents
    agents:
      main_agent:
        model: "qwen-max"
        temperature: 0.7
      research_agent:
        model: "qwen-max"
        temperature: 0.5
        skills:
          - web_search
          - summarization
      coding_agent:
        model: "qwen-coder"
        temperature: 0.3
        skills:
          - code_analysis
          - debugging
      writing_agent:
        model: "qwen-max"
        temperature: 0.8
        skills:
          - writing
          - editing
```

**Usage:**
```
/research What's the latest on quantum computing?
→ Routes to research_agent

/code Review this Python function
→ Routes to coding_agent

/write Draft an email to the team
→ Routes to writing_agent

Hello!
→ Routes to main_agent
```

