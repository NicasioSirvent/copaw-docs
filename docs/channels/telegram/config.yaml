# CoPaw Telegram Channel Configuration Templates

Configuration examples for various Telegram deployment scenarios.

---

## Basic Configuration Templates

### 1. Testing Setup (Polling Mode)

**File:** `~/.copaw/config.yaml`

```yaml
# ============================================
# CoPaw Telegram Channel - Testing Configuration
# Mode: Polling (no public IP required)
# ============================================

channels:
  telegram:
    # Required
    enabled: true
    bot_token: "YOUR_BOT_TOKEN_HERE"  # Get from @BotFather
    
    # Connection
    mode: "polling"
    polling_interval: 1.0
    
    # Access Control (for testing only!)
    allow_all_users: true
    
    # Message Handling
    command_prefix: "/"
    max_message_length: 4096
    chunk_messages: true
    parse_mode: "Markdown"
    
    # Session
    session_memory: true
    session_ttl: 3600
```

**Quick Start:**
```bash
# 1. Get bot token from @BotFather
# 2. Replace YOUR_BOT_TOKEN_HERE above
# 3. Start CoPaw
copaw app

# 4. Test in Telegram
# Search for your bot and send: /start
```

---

### 2. Production Setup (Webhook Mode with SSL)

**File:** `~/.copaw/config.yaml`

```yaml
# ============================================
# CoPaw Telegram Channel - Production Configuration
# Mode: Webhook with HTTPS
# ============================================

channels:
  telegram:
    # Required
    enabled: true
    bot_token: "${TELEGRAM_BOT_TOKEN}"  # Use environment variable
    
    # Connection
    mode: "webhook"
    webhook_port: 8787
    webhook_url: "https://copaw.your-domain.com:8787/telegram/callback"
    
    # SSL Certificates (required for webhook)
    ssl_cert: "/etc/letsencrypt/live/your-domain.com/fullchain.pem"
    ssl_key: "/etc/letsencrypt/live/your-domain.com/privkey.pem"
    
    # Access Control
    allow_all_users: false
    allow_from:
      - "123456789"  # Your Telegram user ID
      - "987654321"  # Other allowed users
    dm_policy: "pairing"
    
    # Group Settings
    group_policy: "allowlist"
    group_allow_from:
      - "-1001234567890"  # Your group ID
    require_mention: true
    
    # Message Handling
    command_prefix: "/"
    max_message_length: 4096
    chunk_messages: true
    parse_mode: "Markdown"
    
    # Session
    session_memory: true
    session_ttl: 3600
    
    # Advanced
    timeout: 30
    retry_limit: 3
    log_messages: false
```

**Environment Variables:**
```bash
# .env file
TELEGRAM_BOT_TOKEN=123456789:ABCdefGHIjklMNOpqrsTUVwxyz
```

**SSL Setup (Let's Encrypt):**
```bash
# Install certbot
sudo apt install certbot

# Get certificate
sudo certbot certonly --standalone -d copaw.your-domain.com

# Certificates will be at:
# /etc/letsencrypt/live/your-domain.com/fullchain.pem
# /etc/letsencrypt/live/your-domain.com/privkey.pem
```

