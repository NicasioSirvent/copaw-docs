## Complete Configuration Reference

```yaml
channels:
  telegram:
    # === Required ===
    enabled: true                      # Enable/disable channel
    bot_token: "TOKEN"                 # Telegram Bot API token
    
    # === Connection Mode ===
    mode: "polling"                    # "polling" or "webhook"
    
    # === Polling Settings ===
    polling_interval: 1.0              # Seconds between polls
    
    # === Webhook Settings ===
    webhook_port: 8787                 # Webhook listener port
    webhook_url: "https://..."         # Full webhook URL
    ssl_cert: "/path/to/cert.pem"      # SSL certificate path
    ssl_key: "/path/to/key.pem"        # SSL private key path
    
    # === Access Control ===
    allow_all_users: false             # Allow all users (testing only!)
    allow_from:                        # Allowed user IDs
      - "123456789"
    dm_policy: "pairing"               # "pairing" | "allowlist" | "open" | "disabled"
    
    # === Group Settings ===
    group_policy: "allowlist"          # "allowlist" | "open"
    group_allow_from:                  # Allowed group IDs
      - "-1001234567890"
    require_mention: true              # Require @mention in groups
    group_auto_reply: false            # Auto-reply in groups
    
    # === Message Handling ===
    command_prefix: "/"                # Command prefix
    max_message_length: 4096           # Max message length (Telegram limit)
    chunk_messages: true               # Auto-split long messages
    parse_mode: "Markdown"             # "Markdown" | "HTML" | None
    
    # === Session Management ===
    session_memory: true               # Remember conversation context
    session_ttl: 3600                  # Session timeout (seconds)
    
    # === Rate Limiting ===
    rate_limit:
      enabled: false                   # Enable rate limiting
      messages_per_minute: 10          # Max messages per minute
      burst_limit: 20                  # Max burst messages
    
    # === Content Filtering ===
    content_filter: false              # Enable content filtering
    blocked_keywords:                  # Blocked keywords
      - "spam"
      - "abuse"
    
    # === Advanced ===
    timeout: 30                        # API timeout (seconds)
    retry_limit: 3                     # Max retry attempts
    log_messages: false                # Log all messages (debug)
    debug: false                       # Debug mode
```

